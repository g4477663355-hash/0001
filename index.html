<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>友だち追加で受け取る | 〈サービス名〉公式LINE</title>
<meta name="description" content="友だち追加で限定特典をプレゼント中。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#F4EFE3;
    --paper:#FBF7EC;
    --ink:#1A1A1A;
    --ink-soft:#6A6862;
    --line:#E2DAC4;
    --accent:#06C755;
    --accent-dark:#04A547;
    --gold:#B8985A;
  }

  html, body{height:100%}

  body{
    font-family:'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px 20px;
    position:relative;
    overflow-x:hidden;
  }

  /* Soft atmospheric background */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 80% 0%, rgba(6,199,85,0.06) 0%, transparent 50%),
      radial-gradient(circle at 0% 100%, rgba(184,152,90,0.05) 0%, transparent 50%);
    pointer-events:none;
  }

  /* === Card === */
  .card{
    width:100%;
    max-width:420px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:24px;
    padding:44px 32px 36px;
    position:relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 24px 48px -12px rgba(27,27,27,0.10),
      0 8px 16px -8px rgba(27,27,27,0.06);
    text-align:center;
    animation: rise 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  /* Decorative top tab */
  .card::before{
    content:"";
    position:absolute;
    top:-1px; left:50%;
    transform:translateX(-50%);
    width:72px; height:4px;
    background:var(--gold);
    border-radius:0 0 6px 6px;
  }

  /* Corner ticks (like a ticket) */
  .card::after{
    content:"";
    position:absolute;
    inset:14px;
    border:1px solid var(--line);
    border-radius:14px;
    pointer-events:none;
    opacity:0.5;
  }

  /* === Label === */
  .label{
    font-size:10px;
    letter-spacing:0.35em;
    color:var(--gold);
    font-weight:700;
    margin-bottom:24px;
    position:relative;
    display:inline-block;
    padding:0 16px;
  }
  .label::before, .label::after{
    content:"";
    position:absolute; top:50%;
    width:18px; height:1px;
    background:var(--gold);
    opacity:0.5;
  }
  .label::before{ right:100%; }
  .label::after{ left:100%; }

  /* === Gift icon === */
  .icon{
    width:84px; height:84px;
    margin:0 auto 24px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    box-shadow:
      0 1px 0 rgba(255,255,255,1) inset,
      0 4px 16px rgba(27,27,27,0.06);
    position:relative;
  }
  .icon::after{
    content:"";
    position:absolute;
    inset:-6px;
    border:1px dashed rgba(184,152,90,0.4);
    border-radius:50%;
    animation: spin 30s linear infinite;
  }

  /* === Headline === */
  h1{
    font-family:'Shippori Mincho', serif;
    font-size:clamp(22px, 6vw, 26px);
    font-weight:700;
    line-height:1.5;
    letter-spacing:0.02em;
    margin-bottom:14px;
  }
  h1 .accent{
    color:var(--accent-dark);
    position:relative;
  }
  h1 .accent::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-2px;
    height:6px;
    background:rgba(6,199,85,0.18);
    z-index:-1;
    border-radius:2px;
  }

  /* === Subtext === */
  .sub{
    font-size:14px;
    color:var(--ink-soft);
    margin-bottom:32px;
  }

  /* === Divider === */
  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 auto 28px;
    max-width:200px;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1; height:1px;
    background:var(--line);
  }
  .divider-dot{
    width:5px; height:5px;
    background:var(--gold);
    border-radius:50%;
  }

  /* === CTA === */
  .cta{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:16px;
    padding:19px 24px;
    border-radius:60px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.3) inset,
      0 12px 24px -6px rgba(6,199,85,0.45);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  .cta:hover{
    background:var(--accent-dark);
    transform:translateY(-2px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.3) inset,
      0 16px 32px -8px rgba(6,199,85,0.55);
  }
  .cta:active{ transform:translateY(0); }

  .cta-icon{
    width:24px; height:24px;
    background:#fff;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--accent);
    font-weight:900;
    font-size:13px;
    letter-spacing:-0.05em;
  }

  /* === Note === */
  .note{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:16px;
    letter-spacing:0.05em;
  }
  .note span{
    display:inline-block;
    margin:0 6px;
    opacity:0.5;
  }

  .note-warn{
    font-size:11px;
    line-height:1.7;
    color:var(--ink-soft);
    margin-top:14px;
    padding-top:14px;
    border-top:1px dashed var(--line);
  }
  .note-warn strong{
    color:var(--ink);
    font-weight:700;
    background:rgba(184,152,90,0.15);
    padding:1px 4px;
    border-radius:3px;
  }

  .legal{
    margin-top:20px;
    padding-top:16px;
    border-top:1px solid var(--line);
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .legal a{
    color:var(--ink-soft);
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    padding-bottom:1px;
  }
  .legal a:hover{
    color:var(--ink);
    border-bottom-color:var(--ink-soft);
  }
  .legal span{
    opacity:0.4;
  }

  /* === Animations === */
  @keyframes rise{
    from{ opacity:0; transform:translateY(16px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes spin{
    to{ transform:rotate(360deg); }
  }

  @media (max-width: 380px){
    .card{ padding:36px 24px 30px; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="label">OFFICIAL LINE</div>

  <div class="icon">🎁</div>

  <h1>
    友だち追加で<br>
    <span class="accent">特典</span>を受け取る
  </h1>

  <p class="sub">下のボタンをタップするだけで完了します。</p>

  <div class="divider">
    <span class="divider-dot"></span>
  </div>

  <a href="https://lin.ee/Ot5hcjo" class="cta" target="_blank" rel="noopener">
    <span class="cta-icon">L</span>
    LINE追加で受け取り
  </a>

  <p class="note">無料 <span>·</span> いつでも解除OK</p>

  <p class="note-warn">※ ボタンを押してもアクセスできない場合は、<br>ボタンを<strong>長押し</strong>してリンクをコピーしてください。</p>

  <div class="legal">
    <a href="tokushoho.html" target="_blank" rel="noopener">特定商取引法に基づく表記</a>
    <span aria-hidden="true">/</span>
    <a href="privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>
  </div>

</div>

</body>
</html>
